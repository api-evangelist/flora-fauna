aid: flora-fauna
name: FLORA
description: >-
  FLORA is a Brooklyn, New York-based applied AI / HCI company building a
  browser-based "infinite canvas" creative workspace for professional
  creators. Founded in 2024 by Weber Wong out of NYU's Interactive
  Telecommunications Program (ITP), FLORA unifies 50+ third-party text,
  image, and video AI models inside a single node-based visual workspace
  where designers, filmmakers, photographers, and creative agencies wire
  prompts, references, characters, and outputs into reusable generative
  workflows. The platform integrates leading image models (FLUX.2, FLUX
  Kontext, Stable Diffusion 3.5, Nano Banana, Recraft, Seedream, Minimax
  Hailuo) and video models (Veo 3, Sora 2, Runway Gen-4 Turbo / Gen-3 Alpha
  / Act-Two, Pika, Kling, Luma Ray 2, Seedance, Marey) alongside reasoning
  models such as Gemini 3 Pro and GPT-5.4, and ships a creative agent named
  FAUNA for ideation, iteration, and workflow scaffolding. FLORA is used at
  agencies and studios including Pentagram, Milk, and MSCHF; the company
  raised a $6.5M seed led by Mike Volpi at Hanabi Capital with Menlo
  Ventures, a16z Games Speedrun, Long Journey Ventures, Company Ventures,
  Alumni Ventures, Embedding VC, and angels including Justin Kan (Twitch)
  and Gabe Whaley (MSCHF), and operates in-person from the Domino Refinery
  in Williamsburg. The product is sold direct to creative professionals via
  a free tier and paid subscription (Pro from ~$16/month); there is no
  public developer API, SDK, or open-source release — FLORA's surface
  area is the in-app canvas and FAUNA agent, with model access mediated
  by the platform rather than exposed to third-party developers.
